name: PR Review Lab

on:
  pull_request:
    types: [opened, synchronize, labeled]

jobs:
  pr-review-lab:
    if: contains(github.event.pull_request.labels.*.name, 'pr-review-lab')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: |
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --package-manager npm
          bob --version

      - name: Run Bob
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Ejecutando Bob para probar si puede acceder a los archivos..."
          bob --accept-license --yolo -p "Por favor usa la skill de 'code-review' para analizar los cambios de este PR" > /tmp/review.md 2>&1

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🧪 PR Review Lab (Bob)\n\n${review}`
            });
