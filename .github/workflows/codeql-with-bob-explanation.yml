# ============================================================================
# GitHub Workflow: CodeQL with Bob Explanation
# ============================================================================
#
# PURPOSE:
# This workflow combines CodeQL security scanning with Bob Shell to:
# 1. Run CodeQL analysis to detect security vulnerabilities
# 2. Use Bob Shell to explain findings in simple terms
# 3. Post detailed explanations as PR comments
#
# WORKFLOW STEPS:
# 1. Run CodeQL security scan
# 2. Fetch CodeQL alerts from GitHub API
# 3. Use Bob Shell to analyze and explain each finding
# 4. Post explanations as PR comments
#
# REQUIREMENTS:
# - GitHub Secrets:
#   * BOBSHELL_API_KEY: API key for Bob Shell
# - Permissions: security-events, pull-requests write
#
# USAGE:
# Runs automatically on PRs and push to main, plus weekly schedule
#
# ============================================================================

name: CodeQL with Bob Explanation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: Analyze with CodeQL and Bob
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript,python"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: |
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --package-manager npm
          if command -v bob &> /dev/null; then
            echo "Bob Shell installed"
            bob --version
          else
            echo "Bob Shell installation failed"
            exit 1
          fi

      - name: Authenticate Bob Shell
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          bob auth login --api-key "$BOBSHELL_API_KEY"

      - name: Fetch CodeQL Alerts
        id: fetch_alerts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching CodeQL alerts..."
          curl -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts" \
            > /tmp/codeql-alerts.json
          
          ALERT_COUNT=$(jq length /tmp/codeql-alerts.json)
          echo "Found ${ALERT_COUNT} alerts"
          echo "alert_count=${ALERT_COUNT}" >> $GITHUB_OUTPUT

      - name: Create Bob Prompt
        if: steps.fetch_alerts.outputs.alert_count > 0
        run: |
          echo "You are a security expert explaining CodeQL findings to developers." > /tmp/bob_prompt.txt
          echo "" >> /tmp/bob_prompt.txt
          echo "## CodeQL Security Findings" >> /tmp/bob_prompt.txt
          echo "" >> /tmp/bob_prompt.txt
          echo "The following security vulnerabilities were detected:" >> /tmp/bob_prompt.txt
          echo "" >> /tmp/bob_prompt.txt
          echo '```json' >> /tmp/bob_prompt.txt
          cat /tmp/codeql-alerts.json >> /tmp/bob_prompt.txt
          echo '```' >> /tmp/bob_prompt.txt
          echo "" >> /tmp/bob_prompt.txt
          echo "## Your Task" >> /tmp/bob_prompt.txt
          echo "" >> /tmp/bob_prompt.txt
          echo "For each finding, provide:" >> /tmp/bob_prompt.txt
          echo "1. Vulnerability Name" >> /tmp/bob_prompt.txt
          echo "2. Severity Level" >> /tmp/bob_prompt.txt
          echo "3. Simple explanation" >> /tmp/bob_prompt.txt
          echo "4. Why it's dangerous" >> /tmp/bob_prompt.txt
          echo "5. How to fix it" >> /tmp/bob_prompt.txt
          echo "6. Code example" >> /tmp/bob_prompt.txt

      - name: Get Bob Explanation
        if: steps.fetch_alerts.outputs.alert_count > 0
        id: bob_explain
        run: |
          echo "Getting Bob explanation..."
          bob ask "$(cat /tmp/bob_prompt.txt)" > /tmp/bob_explanation.md
          echo "Explanation generated"

      - name: Post Explanation
        if: steps.fetch_alerts.outputs.alert_count > 0 && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const explanation = fs.readFileSync('/tmp/bob_explanation.md', 'utf8');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## CodeQL Security Analysis\n\n${explanation}`
            });

# Made with Bob
