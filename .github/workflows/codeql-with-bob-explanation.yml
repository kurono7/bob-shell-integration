# ============================================================================
# GitHub Workflow: CodeQL with Bob Explanation
# ============================================================================
#
# PURPOSE:
# Combines CodeQL security scanning with Bob Shell to explain findings
# in plain English, post them as PR comments, and upload as artifact.
#
# REQUIREMENTS:
# - GitHub Secrets: BOBSHELL_API_KEY
# - Permissions: security-events, pull-requests write
#
# ============================================================================

name: CodeQL with Bob Explanation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: Analyze with CodeQL and Bob
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript,python"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: |
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --package-manager npm
          if command -v bob &> /dev/null; then
            echo "Bob Shell installed"
            bob --version
          else
            echo "Bob Shell installation failed"
            exit 1
          fi

      - name: Authenticate Bob Shell
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Configuring Bob Shell authentication..."
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY secret is not set"
            exit 1
          fi
          echo "Bob Shell authentication configured successfully"

      - name: Fetch CodeQL Alerts
        id: fetch_alerts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching CodeQL alerts..."
          curl -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts" \
            > /tmp/codeql-alerts.json

          ALERT_COUNT=$(jq length /tmp/codeql-alerts.json)
          echo "Found ${ALERT_COUNT} alerts"
          echo "alert_count=${ALERT_COUNT}" >> $GITHUB_OUTPUT

      - name: Create Bob Prompt
        if: steps.fetch_alerts.outputs.alert_count > 0
        run: |
          PROMPT_FILE="/tmp/bob_prompt.txt"

          {
            echo "You are a security expert explaining CodeQL findings to developers."
            echo ""
            echo "CodeQL Security Findings"
            echo ""
            echo "The following security vulnerabilities were detected:"
            echo ""
            echo '```json'
            cat /tmp/codeql-alerts.json
            echo '```'
            echo ""
            echo "Your Task"
            echo ""
            echo "For each finding, provide:"
            echo "1. Vulnerability Name and severity"
            echo "2. Simple plain-English explanation of what it is"
            echo "3. Why it is dangerous / what an attacker can do"
            echo "4. How to fix it (specific code change)"
            echo "5. A corrected code example"
            echo ""
            echo "Be concise, practical, and developer-friendly."
          } > "${PROMPT_FILE}"

      - name: Get Bob Explanation
        if: steps.fetch_alerts.outputs.alert_count > 0
        id: bob_explain
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Getting Bob explanation..."
          bob --accept-license < /tmp/bob_prompt.txt > /tmp/bob_explanation.md 2>&1
          echo "Explanation generated ($(wc -l < /tmp/bob_explanation.md) lines)"

      - name: Write Explanation to Step Summary
        if: steps.fetch_alerts.outputs.alert_count > 0
        run: |
          echo "## CodeQL Security Analysis - Bob Shell Explanation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Alerts found:** ${{ steps.fetch_alerts.outputs.alert_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat /tmp/bob_explanation.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Explanation as Artifact
        if: steps.fetch_alerts.outputs.alert_count > 0
        uses: actions/upload-artifact@v4
        with:
          name: codeql-bob-explanation-${{ github.run_id }}
          path: /tmp/bob_explanation.md
          retention-days: 30

      - name: Post Explanation as PR Comment
        if: steps.fetch_alerts.outputs.alert_count > 0 && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let explanation = fs.readFileSync('/tmp/bob_explanation.md', 'utf8');

            const MAX_LENGTH = 60000;
            if (explanation.length > MAX_LENGTH) {
              explanation = explanation.substring(0, MAX_LENGTH) + '\n\n---\n> Truncated. Download full report from workflow artifacts.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## CodeQL Security Analysis\n\n${explanation}`
            });

# Made with Bob
