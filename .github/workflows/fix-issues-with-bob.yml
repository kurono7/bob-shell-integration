# ============================================================================
# GitHub Workflow: Fix Issues with Bob
# ============================================================================
#
# PURPOSE:
# This workflow automatically fixes GitHub issues using IBM Bob Shell, an AI-powered
# coding assistant. When an issue is labeled with 'fix-with-bob', this workflow:
# 1. Analyzes the issue description and requirements
# 2. Uses Bob Shell to generate code changes that address the issue
# 3. Creates a pull request with the proposed fixes
# 4. Provides feedback on the issue with status updates
#
# WORKFLOW STEPS:
# 1. Trigger: Activated when 'fix-with-bob' label is added to an issue
# 2. Setup: Checkout repository and install Node.js 22 (required for Bob Shell)
# 3. Install Bob Shell: Download and install Bob Shell using the official installer
# 4. Authentication: Configure Bob Shell with BOBSHELL_API_KEY from GitHub secrets
# 5. Context Gathering: Extract issue details (number, title, description)
# 6. Git Configuration: Configure Git user for commits
# 7. Branch Creation: Create a new branch named 'fix-issue-{number}'
# 8. Bob Execution: Run Bob Shell with a prompt containing the issue context
# 9. Change Detection: Check if Bob made any code modifications
# 10. Push Changes: Commit and push changes to the current repository
# 11. PR Creation: Create a pull request to the main branch
# 12. Feedback: Comment on the issue with workflow status (success/failure/no changes)
#
# DIRECT PUSH WORKFLOW:
# This workflow uses a direct push approach where:
# - Changes are pushed directly to a branch in the same repository
# - Pull requests are created from the branch to the main branch
# - This works with the default GITHUB_TOKEN permissions
# - No fork or external PAT required
#
# REQUIREMENTS:
# - GitHub Secrets (must be configured in repository settings):
#   * BOBSHELL_API_KEY: API key for Bob Shell authentication
# - Label: 'fix-with-bob' must exist in the repository
# - Permissions: Workflow needs write access to issues, PRs, and repository contents
#
# USAGE:
# Simply add the 'fix-with-bob' label to any issue you want Bob to attempt to fix.
# The workflow will automatically trigger and process the issue.
#
# NOTE:
# Bob Shell's exact CLI interface may require adjustments. The current implementation
# pipes a prompt file to Bob via stdin. Consult Bob Shell documentation for the
# most accurate command syntax.
# ============================================================================

name: Fix Issues with Bob

on:
  issues:
    types: [labeled]

jobs:
  fix-issues-with-bob:
    # Only run when the 'fix-with-bob' label is added
    if: github.event.label.name == 'fix-with-bob'
    runs-on: ubuntu-latest
    
    permissions:
      issues: write
      pull-requests: write
      contents: write
      deployments: write
      statuses: write
      actions: write
      checks: read    

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0  # Full history for better context
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install Bob Shell
        run: |
          echo "Installing Bob Shell..."
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --package-manager npm

          # Verify installation
          if command -v bob &> /dev/null; then
            echo "Bob Shell installed successfully"
            bob --version
          else
            echo "Bob Shell installation failed"
            exit 1
          fi
      
      - name: Authenticate Bob Shell
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Configuring Bob Shell authentication..."
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY secret is not set"
            exit 1
          fi
          # Bob Shell uses BOBSHELL_API_KEY environment variable for authentication
          echo "Bob Shell authentication configured successfully"
      
      - name: Get Issue Details
        id: issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          echo "issue_number=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT
          
          # Always fetch from GitHub API to ensure consistent JSON handling
          # This prevents issues with special characters (backticks, quotes, etc.) in issue bodies
          ISSUE_DATA=$(gh api repos/${{ github.repository }}/issues/${ISSUE_NUMBER})
          
          # Use jq to safely extract and handle special characters
          ISSUE_TITLE=$(echo "${ISSUE_DATA}" | jq -r '.title')
          ISSUE_BODY=$(echo "${ISSUE_DATA}" | jq -r '.body // ""')
          
          # Save issue title and body to output using heredoc
          {
            echo "issue_title<<TITLE_EOF"
            echo "${ISSUE_TITLE}"
            echo "TITLE_EOF"
            echo "issue_body<<BODY_EOF"
            echo "${ISSUE_BODY}"
            echo "BODY_EOF"
          } >> $GITHUB_OUTPUT
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Create Branch for Fix
        run: |
          BRANCH_NAME="fix-issue-${{ steps.issue.outputs.issue_number }}"
          git checkout -b "${BRANCH_NAME}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
      
      - name: Load Custom Skills
        id: load_skills
        run: |
          echo "Loading custom coding standards from .bob/skills/ directory..."
          
          SKILLS_CONTENT=""
          SKILL_COUNT=0
          
          if [ -d ".bob/skills" ]; then
            # Load skills from subdirectories (official Bob structure)
            for skill_dir in .bob/skills/*/; do
              if [ -d "$skill_dir" ]; then
                skill_file="${skill_dir}SKILL.md"
                if [ -f "$skill_file" ]; then
                  skill_name=$(basename "$skill_dir")
                  echo "Loading: $skill_name"
                  SKILLS_CONTENT="${SKILLS_CONTENT}\n\n## $(echo $skill_name | tr '-' ' ' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2));}1')\n\n"
                  SKILLS_CONTENT="${SKILLS_CONTENT}$(cat $skill_file)"
                  SKILL_COUNT=$((SKILL_COUNT + 1))
                fi
              fi
            done
            echo "Loaded ${SKILL_COUNT} coding standard files"
          else
            echo ".bob/skills/ directory not found, using default standards"
          fi
          
          # Save to file
          echo -e "${SKILLS_CONTENT}" > /tmp/skills_context.md
          echo "skills_count=${SKILL_COUNT}" >> $GITHUB_OUTPUT
      
      - name: Execute Bob to Fix Issue
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            # Read custom skills
            SKILLS_CONTEXT=""
            if [ -f /tmp/skills_context.md ]; then
              SKILLS_CONTEXT=$(cat /tmp/skills_context.md)
            fi
            
            # Create a comprehensive prompt for Bob Shell
            PROMPT="Fix GitHub issue #${{ steps.issue.outputs.issue_number }}: ${{ steps.issue.outputs.issue_title }}

            Repository: ${{ github.repository }}
            Issue URL: ${{ github.event.issue.html_url }}

            ## Coding Standards to Follow

            When implementing the fix, ensure all code complies with these standards:

            ${SKILLS_CONTEXT}

            ## Issue Description

            ${{ steps.issue.outputs.issue_body }}

            ## Instructions

            Please analyze this issue and make all necessary code changes to fix it.
            
            Requirements:
            1. Ensure the changes are complete and resolve the issue
            2. Follow all coding standards above (SOLID principles, security, architecture patterns, code quality)
            3. Do not introduce new violations of the coding standards
            4. Write clean, maintainable, and secure code
            5. Consider edge cases and error handling
            6. Ensure backward compatibility if applicable
            7. CRITICAL INSTRUCTION: ONLY modify local files. DO NOT use git to commit or push. DO NOT use gh to create pull requests. The GitHub Actions workflow will automatically handle all git commits and pull request creation. Do not execute any terminal commands related to git or github.
            
            Make the fix production-ready and compliant with best practices."

            # --accept-license: required on first run in a fresh CI environment
            # --yolo: required to enable file writing (disabled by default)
            bob --accept-license --yolo -p "${PROMPT}"
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.issue_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check for Changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi
      
      - name: Commit and Push Changes
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A
          git reset .bob/ || true
          git commit -m "Fix issue #${{ steps.issue.outputs.issue_number }}: ${{ steps.issue.outputs.issue_title }}"
          
          # Set authenticated remote URL using the PAT for write access
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          
          echo "Pushing branch ${BRANCH_NAME} to origin..."
          if git push -u origin "${BRANCH_NAME}"; then
            echo "✓ Branch ${BRANCH_NAME} pushed successfully"
          else
            echo "✗ Failed to push branch"
            exit 1
          fi
      
      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the diff stats first
          DIFF_STATS=$(git diff origin/main...HEAD --stat || echo "Unable to generate diff stats")
          
          # Create PR body as a variable first to avoid quoting issues
          PR_BODY=$(cat <<EOF
          This PR was automatically generated by Bob Shell to fix issue #${{ steps.issue.outputs.issue_number }}.

          ## Issue Details
          ${{ steps.issue.outputs.issue_body }}

          ## Changes
          Bob Shell analyzed the issue and applied the following fixes:
          ${DIFF_STATS}

          Closes #${{ steps.issue.outputs.issue_number }}
          EOF
          )
          
          # Create PR from the fix branch to main in the same repository
          PR_URL=$(gh pr create \
            --repo ${{ github.repository }} \
            --title "Fix: Issue #${{ steps.issue.outputs.issue_number }} - ${{ steps.issue.outputs.issue_title }}" \
            --body "${PR_BODY}" \
            --base main \
            --head "${BRANCH_NAME}")
          
          echo "PR_URL=${PR_URL}" >> $GITHUB_ENV
          
          # Extract PR number from URL
          PR_NUMBER=$(echo "${PR_URL}" | grep -oP '\d+$')
          echo "PR_NUMBER=${PR_NUMBER}" >> $GITHUB_ENV
          
          # Add the fix-with-bob label to the PR
          gh pr edit "${PR_NUMBER}" --repo ${{ github.repository }} --add-label "fix-with-bob"
          echo "✓ Added 'fix-with-bob' label to PR #${PR_NUMBER}"
      
      - name: Comment on Issue
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} \
            --body "Bob Shell has analyzed this issue and created a pull request with a proposed fix. Please review the changes."
      
      - name: Comment on Issue - No Changes
        if: steps.changes.outputs.has_changes == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} \
            --body "Bob Shell analyzed this issue but did not generate any code changes. Manual intervention may be required."
      
      - name: Handle Errors
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} \
            --body "❌ Bob Shell encountered an error while trying to fix this issue. Please check the workflow logs for details."
