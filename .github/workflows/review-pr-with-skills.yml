# ============================================================================
# GitHub Workflow: Review PR with Custom Skills
# ============================================================================
#
# PURPOSE:
# This workflow reviews pull requests using IBM Bob Shell with custom skills
# from the .bob/skills directory. It analyzes code for:
# - SOLID principles violations
# - Security vulnerabilities
# - Architecture pattern issues
# - Code quality problems
#
# WORKFLOW STEPS:
# 1. Trigger: Activated when PR is opened/updated with 'review-with-bob' label
# 2. Checkout: Get PR code and skills directory
# 3. Install Bob Shell: Setup Bob Shell CLI
# 4. Load Skills: Read all SKILL.md files from .bob/skills/*/
# 5. Get PR Diff: Extract changes from the PR
# 6. Bob Review: Run Bob with skills as context
# 7. Post Results: Comment on PR with findings
#
# REQUIREMENTS:
# - GitHub Secrets:
#   * BOBSHELL_API_KEY: API key for Bob Shell
#   * GITHUB_TOKEN: Automatically provided by GitHub
# - Label: 'review-with-bob' must exist in repository
# - Skills: .bob/skills/*/SKILL.md files with review rules
#
# USAGE:
# Add 'review-with-bob' label to any PR to trigger automatic review
#
# ============================================================================

name: Review PR with Custom Skills

on:
  pull_request:
    types: [opened, synchronize, labeled]

jobs:
  review-pr-with-skills:
    if: contains(github.event.pull_request.labels.*.name, 'review-with-bob')
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      
      - name: Checkout base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install Bob Shell
        run: |
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --package-manager npm
          if command -v bob &> /dev/null; then
            echo "Bob Shell installed successfully"
            bob --version
          else
            echo "Bob Shell installation failed"
            exit 1
          fi
      
      - name: Authenticate Bob Shell
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Configuring Bob Shell authentication..."
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY secret is not set"
            exit 1
          fi
          # Bob Shell uses BOBSHELL_API_KEY environment variable for authentication
          echo "Bob Shell authentication configured successfully"
      
      - name: Load Custom Skills
        id: load_skills
        run: |
          echo "Loading custom skills from .bob/skills/"
          SKILLS_CONTENT=""
          SKILL_COUNT=0
          
          for skill_dir in .bob/skills/*/; do
            if [ -d "$skill_dir" ]; then
              skill_file="${skill_dir}SKILL.md"
              if [ -f "$skill_file" ]; then
                skill_name=$(basename "$skill_dir")
                echo "Loading: $skill_name"
                SKILLS_CONTENT="${SKILLS_CONTENT}\n\n# $skill_name\n\n"
                SKILLS_CONTENT="${SKILLS_CONTENT}$(cat $skill_file)"
                SKILL_COUNT=$((SKILL_COUNT + 1))
              fi
            fi
          done
          
          echo "Loaded ${SKILL_COUNT} skill files"
          echo "${SKILLS_CONTENT}" > /tmp/skills_context.md
          echo "skills_count=${SKILL_COUNT}" >> $GITHUB_OUTPUT
      
      - name: Get PR Diff
        id: pr_diff
        run: |
          echo "Generating PR diff..."
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          
          git diff ${BASE_SHA}...${HEAD_SHA} > /tmp/pr_diff.txt
          
          CHANGED_FILES=$(git diff --name-only ${BASE_SHA}...${HEAD_SHA} | tr '\n' ', ')
          DIFF_STATS=$(git diff --stat ${BASE_SHA}...${HEAD_SHA})
          
          echo "changed_files=${CHANGED_FILES}" >> $GITHUB_OUTPUT
          echo "diff_stats<<EOF" >> $GITHUB_OUTPUT
          echo "${DIFF_STATS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Review Prompt
        run: |
          echo "# Code Review Request" > /tmp/review_prompt.md
          echo "" >> /tmp/review_prompt.md
          echo "You are an expert code reviewer analyzing a Pull Request using custom review rules." >> /tmp/review_prompt.md
          echo "" >> /tmp/review_prompt.md
          echo "## Pull Request Information" >> /tmp/review_prompt.md
          echo "" >> /tmp/review_prompt.md
          echo "- **Repository**: ${{ github.repository }}" >> /tmp/review_prompt.md
          echo "- **PR Number**: #${{ github.event.pull_request.number }}" >> /tmp/review_prompt.md
          echo "- **Title**: ${{ github.event.pull_request.title }}" >> /tmp/review_prompt.md
          echo "- **Author**: @${{ github.event.pull_request.user.login }}" >> /tmp/review_prompt.md
          echo "- **Base Branch**: ${{ github.event.pull_request.base.ref }}" >> /tmp/review_prompt.md
          echo "- **Head Branch**: ${{ github.event.pull_request.head.ref }}" >> /tmp/review_prompt.md
          echo "" >> /tmp/review_prompt.md
          echo "## Changed Files" >> /tmp/review_prompt.md
          echo "" >> /tmp/review_prompt.md
          echo "${{ steps.pr_diff.outputs.changed_files }}" >> /tmp/review_prompt.md
          echo "" >> /tmp/review_prompt.md
          echo "## Review Rules" >> /tmp/review_prompt.md
          echo "" >> /tmp/review_prompt.md
          echo "Apply the following custom review rules:" >> /tmp/review_prompt.md
          echo "" >> /tmp/review_prompt.md
          
          if [ -f /tmp/skills_context.md ]; then
            cat /tmp/skills_context.md >> /tmp/review_prompt.md
          fi
          
          echo "" >> /tmp/review_prompt.md
          echo "## Code Changes to Review" >> /tmp/review_prompt.md
          echo "" >> /tmp/review_prompt.md
          echo '```diff' >> /tmp/review_prompt.md
          cat /tmp/pr_diff.txt >> /tmp/review_prompt.md
          echo '```' >> /tmp/review_prompt.md
          
          echo "" >> /tmp/review_prompt.md
          echo "## Review Instructions" >> /tmp/review_prompt.md
          echo "" >> /tmp/review_prompt.md
          echo "1. Analyze ALL code changes" >> /tmp/review_prompt.md
          echo "2. Apply ALL review rules from custom skills" >> /tmp/review_prompt.md
          echo "3. Identify violations by severity" >> /tmp/review_prompt.md
          echo "4. Provide specific recommendations" >> /tmp/review_prompt.md
      
      - name: Run Bob Review
        id: bob_review
        run: |
          echo "Running Bob Shell review..."
          bob ask "$(cat /tmp/review_prompt.md)" > /tmp/bob_review.md
          echo "Review complete"
      
      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/bob_review.md', 'utf8');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Bob Shell Code Review\n\n${review}`
            });

# Made with Bob
